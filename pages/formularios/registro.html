<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <Title>Regsitro</Title>
    </head>
    <body style="font-family: Poppins,sans-serif; background-color: #c2d2e9;">

        <section class="Inicio de Sesion"  style="display: flex; justify-content: center; gap: 35px; margin-top: 40px; flex-wrap: wrap;">
            <div class="Pantalla Logeo"  style="width: 260px; padding: 10px 50px; text-align: center; box-shadow: 0px 4px 10px rgba(0,0,0,0.7); background-color: #f1f1f0; border-radius: 10px;">
                <div class="Icono" style="text-align: center;">
                    <img src="../../imagenes/LogoPrincipal.png" alt="Logo Principal" style="width: 60px; height: 60px; border-radius: 20px;">  
                </div>
                <h2 style=" margin-top: 10px; color: #091d36;">Daat Devotional</h2>
                <p style="margin-top: 10px; color: #3a4e7a;">Crea tu cuenta</p>
                <div class="Formulario" style="text-align: left; margin-top: 10px; font-size: 13px;"> 
                <form method="POST" action="/pages/formularios/login.html">
                
                    <label for="Nombres" style="margin-top: 30px; color: #091d36; display: block;">Nombre Completo</label>
                    <input type="text" id="Nombres" name="Nombres" style="width: 260px; height: 25px; margin-top: 15px; border-radius: 5px; border-color: #c2d2e9;" placeholder="Ingresa tu nombre y apellido" maxlength="50" minlength="10" required>
                    <label for="Correo" style="margin-top: 30px; color: #091d36; display: block;">Correo Electrónico</label>
                    <input type="email" id="Correo" name="Correo" style="width: 260px; height: 25px; margin-top: 15px; border-radius: 5px; border-color: #c2d2e9;" placeholder="Ingrese su correo tu@email.com" maxlength="320" minlength="10" required>
                    <label for="Contraseña" style="margin-top: 25px; color: #091d36; display: block;">Contraseña</label>
                    <input type="password" id="Contraseña" name="Contraseña" style="width: 260px; height: 25px; margin-top: 15px; border-radius: 5px; border-color: #c2d2e9;" placeholder="Ingese su contraseña" maxlength="8" minlength="8" required>
                    <label for="Confirmar" style="margin-top: 25px; color: #091d36; display: block;">Confirmar Contraseña</label>
                    <input type="password" id="Confirmar" name="Confirmar" style="width: 260px; height: 25px; margin-top: 15px; border-radius: 5px; border-color: #c2d2e9;" placeholder="Confirme su contraseña" maxlength="8" minlength="8" required>
                
                    <button type="submit" style="width: 265px; height: 30px; border-radius: 5px; background-color: #3a4e7a; color: #f1f1f0; text-align: center; margin-top: 25px;">Registrarse</button>   
                
                </form>
                </div>

                <div style="text-align: center; font-size: 13px;">
                    <p style="color: #3a4e7a;">¿Ya tienes cuenta?
                        <a href="/pages/formularios/login.html" style="text-decoration: none; color: #c2d2e9;"><b>Inicia Sesión</b></a></p>
                    <p><a href="../../index.html" style="color: #c2d2e9; text-decoration: none;">← Volver al inicio</a></p>
                </div>
            </div>
        </section>

        <footer style="text-align: center; color: #3a4e7a; margin-top: 15px;">
            <p>&copy; 2023 Daat Devotional - Todos los derechos reservados</p>
        </footer>
    </body>
</html>
