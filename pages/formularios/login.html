<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Login</title>
         <link rel="icon" href="../../imagenes/login.ico" type"image/x-icon">
         <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
    <body style="font-family: Poppins,sans-serif; background-color: #c2d2e9;">
        <section class="Inicio de Sesion"  style="display: flex; justify-content: center; gap: 35px; margin-top: 40px; flex-wrap: wrap;">
            <div class="Pantalla Logeo"  style="width: 260px; padding: 10px 50px; text-align: center; box-shadow: 0px 4px 10px rgba(0,0,0,0.7); background-color: #f1f1f0; border-radius: 10px;">
                <div class="Icono" style="text-align: center;">
                    <img src="../../imagenes/LogoPrincipal.png" alt="Logo Principal" style="width: 60px; height: 60px; border-radius: 20px;">  
                </div>
                <h2 style=" margin-top: 10px; color: #091d36;">Daat Devotional</h2>
                <p style="margin-top: 10px; color: #3a4e7a;">Inicia Sesión en tu cuenta</p>
                <div class="Formulario" style="text-align: left; margin-top: 10px; font-size: 13px;">
                <form method="POST" action="../feed/inicio.html">
                    <label for="Correo" style="margin-top: 30px; color: #091d36; display: block;">Correo Electrónico</label>
                    <input type="email" title="Correo" id="Correo" name="Correo" style="width: 260px; height: 25px; margin-top: 15px; border-radius: 5px; border-color: #c2d2e9;" placeholder="Ingrese su correo tu@email.com" maxlength="320" minlength="10" required>
                    <label for="Contraseña" style="margin-top: 25px; color: #091d36; display: block;">Contraseña</label>
                    <input type="password" title="Contraseña" id="Contraseña" name="Contraseña" style="width: 260px; height: 25px; margin-top: 15px; border-radius: 5px; border-color: #c2d2e9;" placeholder="Ingese su contraseña" maxlength="8" minlength="8" required>
                    <button type="submit" title="Iniciar sesión" style="width: 265px; height: 30px; border-radius: 5px; background-color: #3a4e7a; color: #f1f1f0; text-align: center; margin-top: 25px;">Iniciar Sesión</button>   
                </form>
                </div>
                
                <div style="text-align: center; font-size: 13px;">
                    <p style="color: #3a4e7a;">¿No tienes cuenta?
                        <a href="registro.html" style="text-decoration: none; color: #c2d2e9;"><b>Regístrate aquí</b></a></p>
                    <p><a href="../../index.html" style="color: #c2d2e9; text-decoration: none;">← Volver al inicio</a></p>
                </div>
            </div>
        </section>

        <footer style="text-align: center; color: #3a4e7a; margin-top: 15px;">
            <p>&copy; 2026 Daat Devotional - Todos los derechos reservados</p>
        </footer>
    </body>
</html>
